name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "URL to smoke test after deployment"
        required: false
        default: "https://www.aideals.cloud"

jobs:
  deploy-cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url || 'https://www.aideals.cloud' }}
      NEXT_DEPLOYMENT_ID: ${{ github.sha }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY }}
      PRICEAI_RISK_REVIEW_API_KEY: ${{ secrets.PRICEAI_RISK_REVIEW_API_KEY }}
      PRICEAI_RISK_REVIEW_BASE_URL: ${{ secrets.PRICEAI_RISK_REVIEW_BASE_URL }}
      PRICEAI_RISK_REVIEW_MODEL: ${{ secrets.PRICEAI_RISK_REVIEW_MODEL }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
      NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL: ${{ vars.NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run check:cloudflare-env

      - name: Bootstrap production datasets
        run: |
          set -euo pipefail
          npm run import:api-models -- --post
          npm run collect:official -- --all --post --mode=worker

      - run: npm run lint

      - run: npm run build:cloudflare

      - name: Sync Cloudflare Worker secrets
        run: |
          set -euo pipefail

          worker_name="$(node -e "const fs=require('node:fs'); process.stdout.write(JSON.parse(fs.readFileSync('wrangler.jsonc','utf8')).name)")"

          if ! npx wrangler secret list --name "$worker_name" >/dev/null 2>&1; then
            mkdir -p .cloudflare-bootstrap
            cat > .cloudflare-bootstrap/worker.js <<'EOF'
          export default {
            fetch() {
              return new Response("Bootstrapping Cloudflare Worker secrets.", { status: 503 });
            },
          };
          EOF
            cat > .cloudflare-bootstrap/wrangler.jsonc <<EOF
          {
            "name": "$worker_name",
            "main": "worker.js",
            "compatibility_date": "2026-06-11",
            "workers_dev": false,
            "preview_urls": false
          }
          EOF
            npx wrangler deploy \
              --cwd .cloudflare-bootstrap \
              --config wrangler.jsonc \
              --no-bundle
          fi

          secret_file="$(mktemp)"
          trap 'rm -f "$secret_file"' EXIT
          node <<'NODE' > "$secret_file"
          const names = [
            "NEXT_PUBLIC_SUPABASE_URL",
            "NEXT_PUBLIC_SUPABASE_ANON_KEY",
            "SUPABASE_SERVICE_ROLE_KEY",
            "ADMIN_PASSWORD",
            "ADMIN_SESSION_SECRET",
            "ADMIN_SESSION_VERSION",
            "CRON_SECRET",
            "API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY",
            "PRICEAI_RISK_REVIEW_API_KEY",
            "PRICEAI_RISK_REVIEW_BASE_URL",
            "PRICEAI_RISK_REVIEW_MODEL",
            "NEXT_PUBLIC_GA_MEASUREMENT_ID",
          ];
          const secrets = Object.fromEntries(names.map((name) => [name, process.env[name] || ""]));
          process.stdout.write(JSON.stringify(secrets));
          NODE
          npx wrangler secret bulk "$secret_file" --name "$worker_name"

      - run: npm run deploy:cloudflare

      - run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"
