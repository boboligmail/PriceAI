name: Upload Cloudflare Worker Candidate

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Worker Version Preview URL to smoke test after upload"
        required: false
        default: ""

jobs:
  upload-cloudflare-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.preview_url }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run check:cloudflare-env

      - run: npm run lint

      - run: npm run build:cloudflare

      - run: npm run upload:cloudflare

      - name: Smoke preview URL
        if: ${{ inputs.preview_url != '' }}
        run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"

      - name: Next step
        run: |
          echo "Worker candidate uploaded. Smoke the Worker Version Preview URL, then promote manually with:"
          echo "wrangler versions deploy <version-id>@100 --name priceai-cloudflare-poc --message 'promote <git-sha>' --yes"
