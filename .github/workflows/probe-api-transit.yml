name: Probe API Transit

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      station:
        description: "Comma-separated station ids to probe"
        required: false
        default: ""
      target_limit:
        description: "Max target models per probe profile"
        required: false
        default: "1"

concurrency:
  group: probe-api-transit
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run API transit probe
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REQUESTED_STATION: ${{ github.event.inputs.station }}
          REQUESTED_TARGET_LIMIT: ${{ github.event.inputs.target_limit }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/(?:collect-prices|api-transit-probe)\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          STATION="${REQUESTED_STATION:-}"
          TARGET_LIMIT="${REQUESTED_TARGET_LIMIT:-1}"

          BASE_URL="$BASE_URL" STATION="$STATION" TARGET_LIMIT="$TARGET_LIMIT" node <<'NODE'
          const url = new URL("/api/cron/api-transit-probe", process.env.BASE_URL);
          if (process.env.STATION) url.searchParams.set("station", process.env.STATION);
          url.searchParams.set("targetLimit", process.env.TARGET_LIMIT);

          const response = await fetch(url, {
            method: "POST",
            headers: {
              authorization: `Bearer ${process.env.CRON_SECRET}`,
            },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || text || `HTTP ${response.status}`);
          }

          const counts = payload?.counts || {};
          const probed = Number(counts.probed || 0);
          const skipped = Number(counts.skipped || 0);
          const unexpectedSkipped = Array.isArray(payload?.skipped)
            ? payload.skipped.filter((item) => item?.reason !== "profile_disabled")
            : [];
          if (probed === 0 || unexpectedSkipped.length > 0) {
            throw new Error(`API transit probe incomplete: probed=${probed}, skipped=${skipped}, unexpectedSkipped=${unexpectedSkipped.length}`);
          }

          console.log(`API transit probe ok: probed=${probed}, skipped=${skipped}, disabled=${skipped - unexpectedSkipped.length}, success=${counts.successfulRuns || 0}, failed=${counts.failedRuns || 0}`);
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
