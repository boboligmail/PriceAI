name: Collect Cloud Offers

on:
  workflow_dispatch:

concurrency:
  group: collect-cloud-offers
  cancel-in-progress: false

jobs:
  collect-cloud-offers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Collect cloud offers
        run: npm run collect:cloud-offers

      - name: Validate cloud offers
        run: |
          npm run test:cloud
          npm run test:cloud-ui

      - name: Commit changed cloud data
        id: commit-data
        run: |
          set -euo pipefail

          git add data/cloud-offers-db.json data/cloud-offers.json data/cloud-offers.sqlite data/cloud-offer-update-records.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(cloud): refresh cloud offer data"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
